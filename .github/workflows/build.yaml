name: Build and Test

on:
  workflow_call:
    inputs:
      solution_file:
        description: The name of the solution file.
        type: string
        required: true

env: {}

jobs:
  setup:
    name: Setup
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure GitHub Packages
        run: nuget sources add -Name GitHub -UserName ${{ github.actor }} -Password ${{ secrets.GITHUB_TOKEN }} -Source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json -NonInteractive
      - name: NuGet Restore
        run: nuget restore ${{ inputs.solution_file }} -NonInteractive
      - name: Upload Packages Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: packages
          path: packages/
  build:
    name: Build Intel
    runs-on: windows-2022
    needs:
      - setup
    strategy:
      matrix:
        platform:
          - x86
          - x64
        configuration:
          - Debug
          - Release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
      - name: Download Packages Artifact
        uses: actions/download-artifact@v8
        with:
          name: packages
          path: packages/
      - name: Build
        run: msbuild ${{ inputs.solution_file }} -p:Configuration=${{ matrix.configuration }} -p:Platform=${{ matrix.platform }}
      - name: Run console application (x86)
        continue-on-error: true
        run: ./${{ matrix.configuration }}/console-application.exe
      - name: Run console application (everything else)
        continue-on-error: true
        run: ./${{ matrix.platform }}/${{ matrix.configuration }}/console-application.exe
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            Debug/
            Release/
            x64/
  build-arm:
    name: Build ARM
    runs-on: windows-11-arm
    needs:
      - setup
    strategy:
      matrix:
        platform:
          - ARM
          - ARM64
        configuration:
          - Debug
          - Release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
      - name: Download Packages Artifact
        uses: actions/download-artifact@v8
        with:
          name: packages
          path: packages/
      - name: Build
        run: msbuild ${{ inputs.solution_file }} -p:Configuration=${{ matrix.configuration }} -p:Platform=${{ matrix.platform }}
      - name: Run console application
        continue-on-error: true
        run: ./${{ matrix.platform }}/${{ matrix.configuration }}/console-application.exe
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            ARM/
            ARM64/
